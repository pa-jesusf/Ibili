name: Build unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    env:
      DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
      DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
      DANDANPLAY_CALLBACK_URL: ${{ secrets.DANDANPLAY_CALLBACK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build unsigned IPA
        run: ./tools/build_unsigned_ipa.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ibili-unsigned-ipa
          path: dist/Ibili-unsigned.ipa
          if-no-files-found: error
