name: Ibili
options:
  bundleIdPrefix: app.ibili
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_ENABLE_MODULES: "YES"
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: "Manual"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    DEVELOPMENT_LANGUAGE: "zh-Hans"

targets:
  Ibili:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: IbiliApp/Sources
    info:
      path: IbiliApp/Info.plist
      properties:
        CFBundleDisplayName: Ibili
        CFBundleName: Ibili
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
          - en
        LSRequiresIPhoneOS: true
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - audio
        NSPhotoLibraryAddUsageDescription: 需要相册权限以保存评论区图片到相册
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ibili.client
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Frameworks
        OTHER_LDFLAGS:
          - $(inherited)
          - "-ObjC"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_BITCODE: "NO"
    dependencies:
      - framework: Frameworks/IbiliCore.xcframework
        embed: false
      - framework: Frameworks/FFmpegRemux.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: CoreFoundation.framework
      - sdk: AudioToolbox.framework
      - sdk: VideoToolbox.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - sdk: AVFoundation.framework
      - sdk: CoreImage.framework
      - sdk: libz.tbd
      - sdk: libbz2.tbd
      - sdk: libiconv.tbd

  IbiliTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: IbiliApp/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ibili.client.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Ibili
